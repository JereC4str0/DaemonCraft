version: "3.8"

services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: daemoncraft-minecraft
    restart: unless-stopped
    network_mode: host
    environment:
      # --- Core Server Settings ---
      EULA: "true"
      TYPE: "PURPUR"
      VERSION: "1.21.11"
      SERVER_NAME: "DaemonCraft-Dev"
      MOTD: "\\u00A72DaemonCraft\\u00A7r Development Server"

      # --- Memory (tuned for 3.7GB host) ---
      MEMORY: "1200M"
      INIT_MEMORY: "800M"
      MAX_MEMORY: "1200M"

      # --- Aikar's Flags optimized for low RAM ---
      JVM_OPTS: >-
        -XX:+UseG1GC
        -XX:+ParallelRefProcEnabled
        -XX:MaxGCPauseMillis=200
        -XX:+UnlockExperimentalVMOptions
        -XX:+DisableExplicitGC
        -XX:+AlwaysPreTouch
        -XX:G1NewSizePercent=20
        -XX:G1MaxNewSizePercent=30
        -XX:G1HeapRegionSize=4M
        -XX:G1ReservePercent=20
        -XX:G1HeapWastePercent=5
        -XX:+UseStringDeduplication
        -XX:+UseCompressedOops

      # --- Gameplay / Dev Settings ---
      ONLINE_MODE: "false"
      DIFFICULTY: "peaceful"
      CREATE_CONSOLE_IN_PIPE: "true"
      ALLOW_FLIGHT: "true"
      ENABLE_COMMAND_BLOCK: "true"
      SPAWN_PROTECTION: "0"
      MAX_PLAYERS: "5"
      VIEW_DISTANCE: "6"
      SIMULATION_DISTANCE: "6"
      GAME_MODE: "survival"
      MAX_WORLD_SIZE: "10000"
      GENERATE_STRUCTURES: "false"
      SPAWN_ANIMALS: "false"
      SPAWN_MONSTERS: "false"
      SPAWN_NPCS: "true"
      ENTITY_BROADCAST_RANGE_PERCENTAGE: "50"
      SYNC_CHUNK_WRITES: "false"
      USE_NATIVE_TRANSPORT: "true"
      PREVENT_PROXY_CONNECTIONS: "false"
      ENABLE_JMX_MONITORING: "false"
      ENABLE_STATUS: "true"
      NETWORK_COMPRESSION_THRESHOLD: "64"

      # --- Modpack (disabled for dev) ---
      # MODPACK_PLATFORM: "CURSEFORGE"
      # CF_PAGE_URL: "..."
      # CF_API_KEY: ${CF_API_KEY:-}

      # --- Logging ---
      TZ: "UTC"
    volumes:
      - ./server/data:/data
      # Mount our datapack specifically (read-only), leaving datapacks dir writable for Bukkit
      - ./server/datapacks/daemoncraft_vis:/data/world/datapacks/daemoncraft_vis:ro
      # Mount Denizen scripts from repo (read-only)
      - ./server/plugins/denizen:/data/plugins/Denizen/scripts:ro
      # Mount for manual modpack fallback zip (read-only)
      - ./server/modpacks:/modpacks:ro
    tty: true
    stdin_open: true
    healthcheck:
      test: mc-health
      start_period: 1m
      interval: 5s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 1400M
        reservations:
          memory: 800M

  # ---------------------------------------------------------------------------
  # LAN Discovery Broadcaster — disabled to save RAM/CPU
  # ---------------------------------------------------------------------------
  # lan-broadcast:
  #   image: python:3-alpine
  #   container_name: daemoncraft-lan-broadcast
