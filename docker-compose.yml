  #     BROADCAST_PORT: "25565"
  #   volumes:
  #     - ./lan-broadcast/broadcast.py:/broadcast.py:ro
  #   command: python /broadcast.py

  # ---------------------------------------------------------------------------
  # Agent Bridge — disabled, bot server is used directly
  # ---------------------------------------------------------------------------
  # bridge:
  #   build:
  #     context: ./agent-bridge
  #     dockerfile: Dockerfile
  #   container_name: daemoncraft-bridge
  #   restart: unless-stopped
  #   environment:
  #     FLASK_HOST: 0.0.0.0
  #     FLASK_PORT: 5000
  #     FLASK_DEBUG: "false"
  #     BOT_REGISTRY: ""
  #     TRIGGER_TIMEOUT: "30"
  #     LOG_LEVEL: INFO
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - ./agent-bridge:/app
  #   networks:
  #     - daemoncraft
  #   depends_on:
  #     - minecraft

  # ---------------------------------------------------------------------------
  # Redis — disabled to save RAM
  # ---------------------------------------------------------------------------
  # redis:
  #   image: redis:7-alpine
  #   container_name: daemoncraft-redis
  #   restart: unless-stopped
  #   command: redis-server --appendonly yes
  #   volumes:
  #     - redis-data:/data
