# DaemonCraft Development Server — server.properties template
# The itzg/minecraft-server image generates server.properties from env vars on first start.
# This file is provided as a reference and fallback template.

server-name=DaemonCraft-Dev
motd=\\u00A72DaemonCraft\\u00A7r Development Server
gamemode=survival
enable-command-block=true
difficulty=peaceful
allow-flight=true
online-mode=false
max-players=5
spawn-protection=0
view-distance=6
simulation-distance=6
level-name=world
level-seed=
level-type=minecraft\\:normal
pvp=true
white-list=false
enforce-whitelist=false
player-idle-timeout=0
resource-pack=
resource-pack-prompt=
resource-pack-sha1=
require-resource-pack=false
hardcore=false
allow-nether=true
generate-structures=false
spawn-animals=false
spawn-monsters=false
spawn-npcs=true
max-world-size=10000
sync-chunk-writes=false
op-permission-level=4
function-permission-level=2
rate-limit=0
prevent-proxy-connections=false
network-compression-threshold=64
max-tick-time=60000
use-native-transport=true
enable-jmx-monitoring=false
enable-status=true
hide-online-players=false
entity-broadcast-range-percentage=50
